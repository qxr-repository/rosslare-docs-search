<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosslare Documentation - Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .search-box {
            position: relative;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .options {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .checkbox-group {
            display: flex;
            gap: 15px;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        
        input[type="checkbox"] {
            cursor: pointer;
        }
        
        .stats {
            font-size: 13px;
            color: #999;
        }
        
        .loading {
            color: #667eea;
            font-weight: 600;
        }
        
        .results {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .results-count {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }
        
        .result-item {
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .result-item:hover {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding-left: 16px;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .result-filename {
            font-weight: 600;
            color: #667eea;
            font-size: 15px;
            transition: color 0.2s;
        }
        
        .result-item:hover .result-filename {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .result-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 3px;
        }
        
        .badge-type {
            background: #e8f0ff;
            color: #667eea;
        }
        
        .badge-content {
            background: #e8f8f0;
            color: #059669;
        }
        
        .badge-clickable {
            background: #fff3cd;
            color: #856404;
        }
        
        .result-path {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            word-break: break-all;
            font-family: monospace;
        }
        
        .result-snippet {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            background: #fafafa;
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            border-left: 3px solid #667eea;
        }
        
        .snippet-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .result-keywords {
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        
        .keyword {
            background: #f0f4ff;
            color: #667eea;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .highlight {
            background: #fff3cd;
            color: #856404;
            font-weight: 600;
            border-radius: 2px;
            padding: 0 2px;
        }
        
        .no-results {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }
        
        .empty {
            padding: 40px;
            text-align: center;
            color: #999;
        }
        
        .error {
            padding: 20px;
            background: #fee;
            color: #c33;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .open-indicator {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .result-item:hover .open-indicator {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Rosslare Documentation Search</h1>
            <p class="subtitle">Search across filenames and document content • Click results to open</p>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search docs... (e.g., 'firmware AC-825', 'wiring diagram', 'panel configuration')">
            </div>
            
            <div class="options">
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="searchContent" checked>
                        Search content
                    </label>
                    <label>
                        <input type="checkbox" id="searchFilename" checked>
                        Search filenames
                    </label>
                </div>
                <div class="stats">
                    📊 <strong id="totalFiles" class="loading">Loading...</strong> files indexed
                </div>
            </div>
        </div>
        
        <div id="errorContainer"></div>
        <div class="results" id="results"></div>
    </div>

    <script>
        let indexData = null;
        
        // Load index from JSON file
        async function loadIndex() {
            try {
                // Try to load from the same directory (works when both files are in same folder)
                const response = await fetch('search_index.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                indexData = await response.json();
                document.getElementById('totalFiles').textContent = indexData.total_files || 0;
                document.getElementById('totalFiles').classList.remove('loading');
                console.log('Index loaded successfully:', indexData.total_files, 'files');
                
            } catch (error) {
                console.error('Error loading index:', error);
                const errorDiv = document.getElementById('errorContainer');
                errorDiv.innerHTML = `
                    <div class="error">
                        <strong>⚠️ Index file not found</strong><br>
                        Make sure <code>search_index.json</code> is in the same folder as this file.<br>
                        <small>Error: ${error.message}</small>
                    </div>
                `;
                document.getElementById('results').innerHTML = '<div class="empty">Please ensure search_index.json is in the same directory as this file.</div>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const regex = new RegExp(`(${query.split(/\s+/).join('|')})`, 'gi');
            let html = escapeHtml(text);
            html = html.replace(regex, '<span class="highlight">$1</span>');
            return html;
        }
        
        function getContextSnippet(text, query, length = 200) {
            if (!text || !query) return text.substring(0, length) + (text.length > length ? "..." : "");
            
            const queryTerms = query.toLowerCase().split(/\s+/);
            const lowerText = text.toLowerCase();
            
            let minIndex = lowerText.length;
            for (const term of queryTerms) {
                const idx = lowerText.indexOf(term);
                if (idx !== -1 && idx < minIndex) minIndex = idx;
            }
            
            if (minIndex === lowerText.length) {
                return text.substring(0, length) + (text.length > length ? "..." : "");
            }
            
            const start = Math.max(0, minIndex - 50);
            const end = Math.min(text.length, start + length + 100);
            const snippet = text.substring(start, end);
            
            return (start > 0 ? "..." : "") + snippet + (end < text.length ? "..." : "");
        }
        
        function openFile(filePath) {
            const baseDir = "C:\\Users\\jjensen\\OneDrive\\Desktop\\Rosslare Documentation\\";
            const fullPath = baseDir + filePath.replace(/\//g, '\\');
            const fileUrl = 'file:///' + fullPath.replace(/\\/g, '/');
            
            console.log('Opening:', fileUrl);
            window.open(fileUrl, '_blank');
        }
        
        function search(query) {
            if (!indexData) return;
            
            const results = document.getElementById('results');
            const searchContent = document.getElementById('searchContent').checked;
            const searchFilename = document.getElementById('searchFilename').checked;
            
            if (!query.trim()) {
                results.innerHTML = '<div class="empty">Enter a search term to begin</div>';
                return;
            }
            
            const lowerQuery = query.toLowerCase();
            const queryTerms = lowerQuery.split(/\s+/).filter(t => t);
            const matches = [];
            
            for (const file of indexData.files) {
                let score = 0;
                let matchType = '';
                
                if (searchFilename) {
                    if (file.filename.toLowerCase().includes(lowerQuery)) {
                        score += 5000;
                        matchType = 'filename';
                    }
                    for (const term of queryTerms) {
                        if (file.filename.toLowerCase().includes(term)) {
                            score += 500;
                        }
                    }
                }
                
                if (file.keywords) {
                    const matching = file.keywords.filter(k => 
                        queryTerms.some(t => k.includes(t))
                    );
                    score += matching.length * 300;
                }
                
                if (searchContent && file.content) {
                    const contentLower = file.content.toLowerCase();
                    for (const term of queryTerms) {
                        const count = (contentLower.match(new RegExp(term, 'g')) || []).length;
                        score += count * 100;
                    }
                    if (score > 0 && !matchType) matchType = 'content';
                }
                
                if (score > 0) {
                    matches.push({ file, score, matchType });
                }
            }
            
            matches.sort((a, b) => b.score - a.score);
            
            if (matches.length === 0) {
                results.innerHTML = '<div class="no-results">No files found matching "' + escapeHtml(query) + '"</div>';
                return;
            }
            
            let resultsHTML = '<div class="results-count">' + matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' found</div>';
            
            for (const m of matches.slice(0, 100)) {
                const file = m.file;
                const keywords = file.keywords ? file.keywords.slice(0, 6) : [];
                
                resultsHTML += `
                    <div class="result-item" onclick="openFile('${escapeHtml(file.path)}')">
                        <div class="result-header">
                            <div>
                                <div class="result-filename">
                                    ${escapeHtml(file.filename)}
                                    <span class="open-indicator">🔗 Click to open</span>
                                </div>
                            </div>
                            <div class="result-badges">
                                <span class="badge badge-type">${escapeHtml(file.file_type)}</span>
                                ${file.has_content ? '<span class="badge badge-content">✓ Content</span>' : ''}
                                <span class="badge badge-clickable">↗ Clickable</span>
                            </div>
                        </div>
                        <div class="result-path">📁 ${escapeHtml(file.path)}</div>
                `;
                
                let snippet = '';
                if (file.has_content && file.content) {
                    const contextSnippet = getContextSnippet(file.content, query, 200);
                    snippet = `
                        <div class="result-snippet">
                            <div class="snippet-label">📄 Content Match</div>
                            ${highlightMatch(contextSnippet, query)}
                        </div>
                    `;
                } else if (file.snippet) {
                    snippet = `
                        <div class="result-snippet">
                            <div class="snippet-label">📋 Preview</div>
                            ${escapeHtml(file.snippet)}
                        </div>
                    `;
                }
                
                resultsHTML += snippet;
                
                if (keywords.length > 0) {
                    resultsHTML += '<div class="result-keywords">' + 
                        keywords.map(k => `<span class="keyword">${escapeHtml(k)}</span>`).join('') + 
                        '</div>';
                }
                
                resultsHTML += '</div>';
            }
            
            results.innerHTML = resultsHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            search(e.target.value);
        });
        
        document.getElementById('searchContent').addEventListener('change', () => {
            search(document.getElementById('searchInput').value);
        });
        
        document.getElementById('searchFilename').addEventListener('change', () => {
            search(document.getElementById('searchInput').value);
        });
        
        // Load index when page loads
        window.addEventListener('load', loadIndex);
    </script>
</body>
</html>
