<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosslare Documentation - Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        
        /* Password Screen */
        #passwordScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .password-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        
        .password-box h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .password-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .password-input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .password-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .password-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .error-message {
            color: #c33;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        #passwordScreen.hidden {
            display: none;
        }
        
        /* Main Content */
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .search-box {
            position: relative;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .options {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .checkbox-group {
            display: flex;
            gap: 15px;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        
        input[type="checkbox"] {
            cursor: pointer;
        }
        
        .stats {
            font-size: 13px;
            color: #999;
        }
        
        .loading {
            color: #667eea;
            font-weight: 600;
        }
        
        .results {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .results-count {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }
        
        .result-item {
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .result-item:hover {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding-left: 16px;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .result-filename {
            font-weight: 600;
            color: #667eea;
            font-size: 15px;
            transition: color 0.2s;
        }
        
        .result-item:hover .result-filename {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .result-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 3px;
        }
        
        .badge-type {
            background: #e8f0ff;
            color: #667eea;
        }
        
        .badge-content {
            background: #e8f8f0;
            color: #059669;
        }
        
        .badge-clickable {
            background: #fff3cd;
            color: #856404;
        }
        
        .result-path {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            word-break: break-all;
            font-family: monospace;
        }
        
        .result-snippet {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            background: #fafafa;
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
            max-height: 80px;
            overflow: hidden;
            position: relative;
        }
        
        .result-snippet:hover {
            background: #f0f7ff;
            border-left-color: #764ba2;
        }
        
        .result-snippet.expanded {
            max-height: none;
            padding: 15px;
            background: #f8fbff;
            border: 1px solid #dde7f5;
        }
        
        .snippet-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .expand-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(transparent, #fafafa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #667eea;
        }
        
        .result-snippet.expanded .expand-indicator {
            display: none;
        }
        
        .expanded-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
        }
        
        .snippet-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .result-keywords {
            font-size: 11px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        
        .keyword {
            background: #f0f4ff;
            color: #667eea;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .highlight {
            background: #fff3cd;
            color: #856404;
            font-weight: 600;
            border-radius: 2px;
            padding: 0 2px;
        }
        
        .no-results {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }
        
        .empty {
            padding: 40px;
            text-align: center;
            color: #999;
        }
        
        .error {
            padding: 20px;
            background: #fee;
            color: #c33;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .open-indicator {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .result-item:hover .open-indicator {
            opacity: 1;
        }
        
        .onedrive-button {
            display: inline-block;
            background: #0078d4;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .onedrive-button:hover {
            background: #106ebe;
            transform: translateY(-1px);
        }
        
        .file-path-info {
            font-size: 11px;
            color: #999;
            margin-top: 6px;
            padding: 6px;
            background: #f5f5f5;
            border-radius: 3px;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div id="passwordScreen">
        <div class="password-box">
            <h1>🔒 Access Required</h1>
            <p>Enter password to access Rosslare documentation search</p>
            <input type="password" id="passwordInput" class="password-input" placeholder="Enter password" autocomplete="off">
            <button onclick="checkPassword()" class="password-button">Access</button>
            <div id="errorMessage" class="error-message">❌ Incorrect password. Try again.</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="header">
            <h1>📚 Rosslare Documentation Search</h1>
            <p class="subtitle">Search across filenames and document content • Click results to open</p>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search docs... Use quotes for exact match (e.g., \"AC-825\" or firmware)">
            </div>
            
            <div class="options">
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="searchContent" checked>
                        Search content
                    </label>
                    <label>
                        <input type="checkbox" id="searchFilename" checked>
                        Search filenames
                    </label>
                </div>
                <div class="stats">
                    📊 <strong id="totalFiles" class="loading">Loading...</strong> files indexed
                </div>
            </div>
        </div>
        
        <div id="errorContainer"></div>
        <div class="results" id="results"></div>
    </div>

    <script>
        const CORRECT_PASSWORD = "letmeinqxr";
        
        // Password functions
        function initPassword() {
            const authenticated = localStorage.getItem('rosslare_auth');
            if (authenticated === 'true') {
                document.getElementById('passwordScreen').classList.add('hidden');
                loadIndex();
            } else {
                document.getElementById('passwordInput').focus();
            }
        }
        
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMessage');
            
            if (input === CORRECT_PASSWORD) {
                localStorage.setItem('rosslare_auth', 'true');
                document.getElementById('passwordScreen').classList.add('hidden');
                loadIndex();
                errorMsg.classList.remove('show');
            } else {
                errorMsg.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }
        
        // Allow Enter key to submit password
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });
        });
        
        let indexData = null;
        
        // Load index
        async function loadIndex() {
            try {
                const response = await fetch('search_index.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                indexData = await response.json();
                document.getElementById('totalFiles').textContent = indexData.total_files || 0;
                document.getElementById('totalFiles').classList.remove('loading');
                console.log('Index loaded successfully:', indexData.total_files, 'files');
                
            } catch (error) {
                console.error('Error loading index:', error);
                const errorDiv = document.getElementById('errorContainer');
                errorDiv.innerHTML = `
                    <div class="error">
                        <strong>⚠️ Index file not found</strong><br>
                        Make sure <code>search_index.json</code> is in the same folder as this file.<br>
                        <small>Error: ${error.message}</small>
                    </div>
                `;
                document.getElementById('results').innerHTML = '<div class="empty">Please ensure search_index.json is in the same directory as this file.</div>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const regex = new RegExp(`(${query.split(/\s+/).join('|')})`, 'gi');
            let html = escapeHtml(text);
            html = html.replace(regex, '<span class="highlight">$1</span>');
            return html;
        }
        
        function getContextSnippet(text, query, length = 200) {
            if (!text || !query) return text.substring(0, length) + (text.length > length ? "..." : "");
            
            const queryTerms = query.toLowerCase().split(/\s+/);
            const lowerText = text.toLowerCase();
            
            let minIndex = lowerText.length;
            for (const term of queryTerms) {
                const idx = lowerText.indexOf(term);
                if (idx !== -1 && idx < minIndex) minIndex = idx;
            }
            
            if (minIndex === lowerText.length) {
                return text.substring(0, length) + (text.length > length ? "..." : "");
            }
            
            const start = Math.max(0, minIndex - 50);
            const end = Math.min(text.length, start + length + 100);
            const snippet = text.substring(start, end);
            
            return (start > 0 ? "..." : "") + snippet + (end < text.length ? "..." : "");
        }
        
        function openFile(filePath) {
            const baseDir = "C:\\Users\\jjensen\\OneDrive\\Desktop\\Rosslare Documentation\\";
            const fullPath = baseDir + filePath.replace(/\//g, '\\');
            const fileUrl = 'file:///' + fullPath.replace(/\\/g, '/');
            
            console.log('Opening:', fileUrl);
            window.open(fileUrl, '_blank');
        }
        
        function toggleSnippet(id, event) {
            event.stopPropagation();
            const snippet = document.getElementById(id);
            const expandedInfo = snippet.querySelector('.expanded-info');
            
            if (snippet.classList.contains('expanded')) {
                snippet.classList.remove('expanded');
                expandedInfo.style.display = 'none';
            } else {
                snippet.classList.add('expanded');
                expandedInfo.style.display = 'block';
            }
        }
        
        function copyToClipboard(text, event) {
            event.stopPropagation();
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
        
        function openOneDriveFolder(filePath) {
            // Extract folder path from file path
            const parts = filePath.split('/');
            const fileName = parts[parts.length - 1];
            const folderPath = parts.slice(0, -1).join('/');
            
            // OneDrive folder navigation URL
            // This navigates to the folder containing the file
            const oneDriveBaseUrl = 'https://synerion-my.sharepoint.com/personal/jjensen_qumulex_com/Documents/';
            
            let folderUrl = oneDriveBaseUrl;
            if (folderPath) {
                folderUrl += folderPath.replace(/\\|\//g, '/');
            }
            
            window.open(folderUrl, '_blank');
        }
        
        function search(query) {
            if (!indexData) return;
            
            const results = document.getElementById('results');
            const searchContent = document.getElementById('searchContent').checked;
            const searchFilename = document.getElementById('searchFilename').checked;
            
            if (!query.trim()) {
                results.innerHTML = '<div class="empty">Enter a search term to begin</div>';
                return;
            }
            
            // Check if query is wrapped in quotes for exact phrase matching
            const isExactMatch = query.trim().startsWith('"') && query.trim().endsWith('"');
            let lowerQuery = query.toLowerCase();
            let queryTerms = [];
            
            if (isExactMatch) {
                // Remove quotes and search for exact phrase
                lowerQuery = lowerQuery.slice(1, -1);
                queryTerms = [lowerQuery];
            } else {
                // Split into individual terms
                queryTerms = lowerQuery.split(/\s+/).filter(t => t);
            }
            
            const matches = [];
            
            for (const file of indexData.files) {
                let score = 0;
                let matchType = '';
                
                if (searchFilename) {
                    const filenameLower = file.filename.toLowerCase();
                    if (isExactMatch) {
                        if (filenameLower.includes(lowerQuery)) {
                            score += 5000;
                            matchType = 'filename';
                        }
                    } else {
                        if (filenameLower.includes(lowerQuery)) {
                            score += 5000;
                            matchType = 'filename';
                        }
                        for (const term of queryTerms) {
                            if (filenameLower.includes(term)) {
                                score += 500;
                            }
                        }
                    }
                }
                
                if (file.keywords && !isExactMatch) {
                    const matching = file.keywords.filter(k => 
                        queryTerms.some(t => k.includes(t))
                    );
                    score += matching.length * 300;
                }
                
                if (searchContent && file.content) {
                    const contentLower = file.content.toLowerCase();
                    if (isExactMatch) {
                        const count = (contentLower.match(new RegExp(lowerQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
                        score += count * 100;
                    } else {
                        for (const term of queryTerms) {
                            const count = (contentLower.match(new RegExp(term, 'g')) || []).length;
                            score += count * 100;
                        }
                    }
                    if (score > 0 && !matchType) matchType = 'content';
                }
                
                if (score > 0) {
                    matches.push({ file, score, matchType });
                }
            }
            
            matches.sort((a, b) => b.score - a.score);
            
            if (matches.length === 0) {
                results.innerHTML = '<div class="no-results">No files found matching "' + escapeHtml(query) + '"</div>';
                return;
            }
            
            let resultsHTML = '<div class="results-count">' + matches.length + ' result' + (matches.length !== 1 ? 's' : '') + ' found</div>';
            
            for (const m of matches.slice(0, 100)) {
                const file = m.file;
                const keywords = file.keywords ? file.keywords.slice(0, 6) : [];
                
                resultsHTML += `
                    <div class="result-item">
                        <div class="result-header">
                            <div>
                                <div class="result-filename">
                                    ${escapeHtml(file.filename)}
                                </div>
                            </div>
                            <div class="result-badges">
                                <span class="badge badge-type">${escapeHtml(file.file_type)}</span>
                                ${file.has_content ? '<span class="badge badge-content">✓ Content</span>' : ''}
                                <span class="badge badge-clickable">↗ Clickable</span>
                            </div>
                        </div>
                        <div class="result-path">📁 ${escapeHtml(file.path)}</div>
                        <button onclick="copyToClipboard('${file.path}', event)" style="background: #28a745; color: white; padding: 6px 12px; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; margin-top: 8px; margin-right: 6px;">📋 Copy Path</button>
                        <a href="javascript:openOneDriveFolder('${escapeHtml(file.path)}')" class="onedrive-button">🔗 Open Folder in OneDrive</a>
                        <div class="file-path-info">File: ${escapeHtml(file.path)}</div>
                `;
                
                let snippet = '';
                if (file.has_content && file.content) {
                    const shortSnippet = getContextSnippet(file.content, query, 200);
                    const expandedSnippet = getContextSnippet(file.content, query, 1500);
                    const snippetId = 'snippet_' + Math.random().toString(36).substr(2, 9);
                    const hasFormatted = file.formatted_content && file.formatted_content.length > 0;
                    
                    let expandedDisplay = '';
                    if (hasFormatted) {
                        // Show formatted content (Word docs with formatting, Excel as tables, etc)
                        expandedDisplay = `
                            <div style="margin-top: 8px; background: white; padding: 12px; border-radius: 3px; max-height: 400px; overflow-y: auto; border: 1px solid #e0e0e0;">
                                <strong style="display: block; margin-bottom: 8px; color: #667eea;">📄 Document Preview:</strong>
                                <div style="font-size: 12px; line-height: 1.5;">${file.formatted_content}</div>
                            </div>
                        `;
                    } else {
                        // Fall back to text content
                        expandedDisplay = `
                            <div style="margin-top: 8px; background: white; padding: 8px; border-radius: 3px; max-height: 300px; overflow-y: auto;">
                                <strong>Full Context:</strong><br>
                                ${highlightMatch(expandedSnippet, query)}
                            </div>
                        `;
                    }
                    
                    snippet = `
                        <div class="result-snippet" id="${snippetId}" onclick="toggleSnippet('${snippetId}', event)">
                            <div class="snippet-label">📄 Content Match (click to expand - shows ${hasFormatted ? 'formatted preview' : 'full context'})</div>
                            <div class="snippet-content">${highlightMatch(shortSnippet, query)}</div>
                            <div class="expand-indicator">▼ Click to expand</div>
                            <div class="expanded-info" style="display:none;">
                                ${expandedDisplay}
                            </div>
                        </div>
                    `;
                } else if (file.snippet) {
                    snippet = `
                        <div class="result-snippet">
                            <div class="snippet-label">📋 Preview</div>
                            ${escapeHtml(file.snippet)}
                        </div>
                    `;
                }
                
                resultsHTML += snippet;
                
                if (keywords.length > 0) {
                    resultsHTML += '<div class="result-keywords">' + 
                        keywords.map(k => `<span class="keyword">${escapeHtml(k)}</span>`).join('') + 
                        '</div>';
                }
                
                resultsHTML += '</div>';
            }
            
            results.innerHTML = resultsHTML;
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            search(e.target.value);
        });
        
        document.getElementById('searchContent').addEventListener('change', () => {
            search(document.getElementById('searchInput').value);
        });
        
        document.getElementById('searchFilename').addEventListener('change', () => {
            search(document.getElementById('searchInput').value);
        });
        
        // Initialize on page load
        window.addEventListener('load', initPassword);
    </script>
</body>
</html>
